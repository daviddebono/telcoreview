<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Telco Review blog thumbnail">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1f2a44"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0072bd"/>
      <stop offset="1" stop-color="#2b8fd4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="10" fill="url(#a)"/>

  <!-- Subtle pattern -->
  <g opacity="0.08">
    <circle cx="1050" cy="120" r="220" fill="#ffffff"/>
    <circle cx="980" cy="520" r="260" fill="#ffffff"/>
  </g>

  <!-- Card -->
  <g filter="url(#shadow)">
    <rect x="80" y="120" width="1040" height="390" rx="18" fill="#ffffff"/>
    <rect x="80" y="120" width="1040" height="72" rx="18" fill="#f3f4f6"/>
    <rect x="110" y="150" width="260" height="12" rx="6" fill="#0072bd"/>
    <rect x="110" y="230" width="760" height="24" rx="12" fill="#111827" opacity="0.9"/>
    <rect x="110" y="275" width="660" height="16" rx="8" fill="#6b7280" opacity="0.75"/>
    <rect x="110" y="310" width="620" height="16" rx="8" fill="#6b7280" opacity="0.65"/>
    <rect x="110" y="350" width="220" height="44" rx="12" fill="#0072bd"/>
    <rect x="145" y="372" width="150" height="10" rx="5" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Footer label -->
  <text x="80" y="580" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="22" fill="#e5e7eb" opacity="0.95">
    Telco Review " Independent telecommunications review for Australian business
  </text>
</svg>

